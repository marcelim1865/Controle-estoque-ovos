<!DOCTYPE html>
<html>
<head>
<title>Relatório de Saídas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.navbar {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}
.card {
    background: rgba(255, 255, 255, 0.95);
    border: none;
    border-radius: 15px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}
.btn-primary {
    background: linear-gradient(45deg, #667eea, #764ba2);
    border: none;
    border-radius: 25px;
    padding: 10px 20px;
    transition: all 0.3s ease;
}
.btn-primary:hover {
    background: linear-gradient(45deg, #764ba2, #667eea);
    transform: scale(1.05);
}
.btn-success {
    background: linear-gradient(45deg, #28a745, #20c997);
    border: none;
    border-radius: 25px;
    padding: 10px 20px;
    transition: all 0.3s ease;
}
.btn-success:hover {
    background: linear-gradient(45deg, #20c997, #28a745);
    transform: scale(1.05);
}
.table {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 10px;
    overflow: hidden;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container-fluid">
    <a class="navbar-brand text-white fw-bold" href="/"><i class="fas fa-arrow-left"></i> Voltar</a>
  </div>
</nav>

<div class="container mt-4">

  <div class="row mb-4">
    <div class="col-12">
      <div class="card p-4">
        <h1 class="card-title text-center mb-4"><i class="fas fa-chart-line"></i> Relatório de Saídas</h1>

        <form method="GET" class="row g-3 mb-4">
          <div class="col-md-3">
            <label class="form-label">Data Início</label>
            <input type="date" name="data_inicio" value="{{ data_inicio }}" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Data Fim</label>
            <input type="date" name="data_fim" value="{{ data_fim }}" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Cliente (opcional)</label>
            <select name="cliente" class="form-select">
              <option value="">Todos os clientes</option>
              {% for c in clientes %}
              <option value="{{ c }}" {% if c == cliente %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">&nbsp;</label>
            <button type="submit" class="btn btn-primary w-100"><i class="fas fa-search"></i> Filtrar</button>
          </div>
        </form>

        <div class="mb-3 text-center">
          <a href="/relatorio/pdf?data_inicio={{ data_inicio }}&data_fim={{ data_fim }}&cliente={{ cliente }}" class="btn btn-success"><i class="fas fa-file-pdf"></i> Baixar PDF</a>
        </div>

        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Tipo Ovo</th>
                <th>Tipo Caixa</th>
                <th>Quantidade</th>
                <th>Data</th>
              </tr>
            </thead>
            <tbody>
              {% for saida in saidas %}
              <tr>
                <td>{{ saida[0] }}</td>
                <td>{{ saida[1] }}</td>
                <td>{{ saida[2] }}</td>
                <td>{{ saida[3] }}</td>
                <td>{{ saida[4] }}</td>
                <td>{{ saida[5] }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>

        {% if not saidas %}
        <p class="text-center text-muted">Nenhuma saída encontrada para o mês selecionado.</p>
        {% endif %}

      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
